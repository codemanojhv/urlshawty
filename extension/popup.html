<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>urlshawtys</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
    }
    .logo-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .url-display {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 16px;
      word-break: break-all;
      max-height: 60px;
      overflow-y: auto;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #f8fafc;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: #3b82f6;
      background: rgba(255, 255, 255, 0.12);
    }
    input::placeholder {
      color: #64748b;
    }
    .btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      opacity: 0.95;
    }
    .btn:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      margin-top: 16px;
      padding: 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      display: none;
    }
    .result.show {
      display: block;
    }
    .result-label {
      font-size: 11px;
      color: #86efac;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .result-url {
      font-size: 13px;
      color: #f8fafc;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .copy-btn {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }
    .copy-btn:hover {
      background: rgba(34, 197, 94, 0.3);
    }
    .error {
      margin-top: 12px;
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      display: none;
    }
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101"/>
        </svg>
      </div>
      <span>urlshawtys</span>
    </div>
  </div>

  <div class="url-display" id="currentUrl">Loading current tab...</div>

  <div class="input-group">
    <label for="code">Custom codeword (optional)</label>
    <input
      type="text"
      id="code"
      placeholder="my-custom-link"
      maxlength="30"
    />
  </div>

  <button class="btn" id="shortenBtn">Shorten URL</button>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-label">Shortened</div>
    <div class="result-url" id="resultUrl"></div>
    <button class="copy-btn" id="copyBtn">Copy to clipboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
